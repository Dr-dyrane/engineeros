<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="description" content="EngineerOS by Dyrane Academy — a calm, self-guided career accelerator. One day. One mission. One visible win." />
<title>EngineerOS · Dyrane Academy</title>
<style>
/* =========================================================================
   EngineerOS — Design System
   A single-file, Apple-HIG inspired career operating system.
   Sections: 1) Tokens  2) Base  3) Layout  4) Components  5) Views
             6) Animations  7) Responsive  8) Reduced motion
   ========================================================================= */

/* ----- 1) Design Tokens ------------------------------------------------- */
:root{
  /* Light theme (default) */
  --bg:           #f5f5f7;
  --bg-grad-1:    #ffffff;
  --bg-grad-2:    #eef1f5;
  --surface:      #ffffff;
  --card:         rgba(255,255,255,0.72);
  --card-solid:   #ffffff;
  --card-border:  rgba(0,0,0,0.07);
  --hairline:     rgba(0,0,0,0.08);
  --text:         #1d1d1f;
  --text-2:       #565659;
  --text-3:       #86868b;
  --fill:         rgba(120,120,128,0.10);
  --fill-2:       rgba(120,120,128,0.16);

  --accent:       #0a84ff;   /* refined blue  */
  --accent-2:     #00b4d8;   /* cyan          */
  --amber:        #ff9f0a;   /* active mission */
  --amber-soft:   rgba(255,159,10,0.14);
  --green:        #34c759;   /* success        */
  --green-soft:   rgba(52,199,89,0.16);
  --red:          #ff3b30;   /* error          */
  --graphite:     #1d1d1f;

  --on-accent:    #ffffff;
  --on-graphite:  #ffffff;

  --shadow-1: 0 1px 2px rgba(0,0,0,0.04), 0 6px 16px rgba(0,0,0,0.06);
  --shadow-2: 0 2px 6px rgba(0,0,0,0.06), 0 18px 40px rgba(0,0,0,0.10);
  --shadow-pop: 0 10px 30px rgba(0,0,0,0.14);

  --r-xl: 28px;
  --r-lg: 22px;
  --r-md: 16px;
  --r-sm: 12px;
  --r-pill: 999px;

  --gap: 16px;
  --pad: 20px;
  --maxw: 720px;

  --ease: cubic-bezier(.22,1,.36,1);
  --ease-soft: cubic-bezier(.4,0,.2,1);
  --t-fast: .18s;
  --t: .34s;
  --t-slow: .6s;

  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;

  --tabbar-h: 64px;
  --topbar-h: 52px;
  color-scheme: light;
}

/* System dark — only when the user has NOT chosen a manual theme */
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]):not([data-theme="dark"]){
    --bg:           #000000;
    --bg-grad-1:    #1a1a1c;
    --bg-grad-2:    #0a0a0b;
    --surface:      #1c1c1e;
    --card:         rgba(28,28,30,0.66);
    --card-solid:   #1c1c1e;
    --card-border:  rgba(255,255,255,0.10);
    --hairline:     rgba(255,255,255,0.12);
    --text:         #f5f5f7;
    --text-2:       #aeaeb2;
    --text-3:       #8e8e93;
    --fill:         rgba(120,120,128,0.20);
    --fill-2:       rgba(120,120,128,0.28);
    --accent:       #0a84ff;
    --accent-2:     #40c8e0;
    --amber:        #ff9f0a;
    --amber-soft:   rgba(255,159,10,0.18);
    --green:        #30d158;
    --green-soft:   rgba(48,209,88,0.20);
    --red:          #ff453a;
    --graphite:     #f5f5f7;
    --on-graphite:  #000000;
    --shadow-1: 0 1px 2px rgba(0,0,0,0.4), 0 8px 22px rgba(0,0,0,0.5);
    --shadow-2: 0 2px 8px rgba(0,0,0,0.5), 0 20px 44px rgba(0,0,0,0.6);
    --shadow-pop: 0 12px 34px rgba(0,0,0,0.6);
    color-scheme: dark;
  }
}

/* Manual dark */
[data-theme="dark"]{
  --bg:#000000; --bg-grad-1:#1a1a1c; --bg-grad-2:#0a0a0b;
  --surface:#1c1c1e; --card:rgba(28,28,30,0.66); --card-solid:#1c1c1e;
  --card-border:rgba(255,255,255,0.10); --hairline:rgba(255,255,255,0.12);
  --text:#f5f5f7; --text-2:#aeaeb2; --text-3:#8e8e93;
  --fill:rgba(120,120,128,0.20); --fill-2:rgba(120,120,128,0.28);
  --accent:#0a84ff; --accent-2:#40c8e0; --amber:#ff9f0a; --amber-soft:rgba(255,159,10,0.18);
  --green:#30d158; --green-soft:rgba(48,209,88,0.20); --red:#ff453a;
  --graphite:#f5f5f7; --on-graphite:#000000;
  --shadow-1:0 1px 2px rgba(0,0,0,0.4),0 8px 22px rgba(0,0,0,0.5);
  --shadow-2:0 2px 8px rgba(0,0,0,0.5),0 20px 44px rgba(0,0,0,0.6);
  --shadow-pop:0 12px 34px rgba(0,0,0,0.6);
  color-scheme: dark;
}
/* Manual light (explicit, overrides system dark) */
[data-theme="light"]{ color-scheme: light; }

/* ----- 2) Base ---------------------------------------------------------- */
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; }
html{ -webkit-text-size-adjust:100%; }
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.45;
  letter-spacing:-0.01em;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  min-height:100vh;
  overflow-x:hidden;
}
/* ambient background wash */
body::before{
  content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
  background:
    radial-gradient(60% 50% at 18% 0%, var(--bg-grad-1) 0%, transparent 60%),
    radial-gradient(70% 60% at 100% 8%, color-mix(in srgb, var(--accent) 9%, transparent) 0%, transparent 55%),
    radial-gradient(80% 70% at 50% 100%, var(--bg-grad-2) 0%, transparent 60%);
  opacity:.9;
}
h1,h2,h3,h4,p{ margin:0; }
button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input,textarea,select{ font-family:inherit; font-size:16px; color:var(--text); }
a{ color:var(--accent); text-decoration:none; }
::selection{ background:color-mix(in srgb, var(--accent) 26%, transparent); }
:focus-visible{ outline:2.5px solid var(--accent); outline-offset:2px; border-radius:8px; }

/* ----- 3) Layout -------------------------------------------------------- */
#app{ min-height:100vh; display:flex; flex-direction:column; }

#topbar{
  position:sticky; top:0; z-index:50; height:var(--topbar-h);
  display:flex; align-items:center; gap:8px;
  padding:0 14px; padding-top:env(safe-area-inset-top);
  background:color-mix(in srgb, var(--bg) 72%, transparent);
  backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid transparent;
  transition:border-color var(--t);
}
#topbar.scrolled{ border-bottom-color:var(--hairline); }
.brand{ display:flex; flex-direction:column; line-height:1; }
.brand .b1{ font-size:15px; font-weight:700; letter-spacing:-0.02em; }
.brand .b2{ font-size:10px; font-weight:600; color:var(--text-3); letter-spacing:.04em; text-transform:uppercase; margin-top:2px; }
#topbar .spacer{ flex:1; }

.icon-btn{
  width:38px; height:38px; border-radius:var(--r-pill);
  display:grid; place-items:center; color:var(--text);
  background:var(--fill); transition:transform var(--t-fast) var(--ease), background var(--t-fast);
}
.icon-btn:hover{ background:var(--fill-2); }
.icon-btn:active{ transform:scale(.92); }
.icon-btn svg{ width:19px; height:19px; }
#backBtn{ background:transparent; }
#backBtn:hover{ background:var(--fill); }

#views{ flex:1; width:100%; }
.view{ display:none; width:100%; max-width:var(--maxw); margin:0 auto;
  padding:18px var(--pad) calc(var(--tabbar-h) + 90px); }
.view.active{ display:block; }

/* tab bar */
#tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:50;
  display:flex; justify-content:center;
  padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  pointer-events:none;
}
#tabbar .tabwrap{
  pointer-events:auto;
  display:flex; gap:2px; padding:6px;
  background:var(--card); border:1px solid var(--card-border);
  border-radius:var(--r-pill);
  box-shadow:var(--shadow-2);
  backdrop-filter:saturate(180%) blur(22px); -webkit-backdrop-filter:saturate(180%) blur(22px);
  max-width:100%;
}
.tab{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 14px; border-radius:var(--r-pill); color:var(--text-3);
  font-size:10.5px; font-weight:600; letter-spacing:.01em;
  transition:color var(--t-fast), background var(--t-fast), transform var(--t-fast) var(--ease);
  min-width:58px;
}
.tab svg{ width:22px; height:22px; }
.tab:active{ transform:scale(.9); }
.tab.active{ color:var(--accent); }
.tab.active .tabglow{ background:color-mix(in srgb,var(--accent) 14%, transparent); }
.tabglow{ width:100%; height:100%; }

/* onboarding hides chrome */
#app.onboarding #topbar,
#app.onboarding #tabbar{ display:none; }
#app.onboarding #views .view{ padding-bottom:40px; }

/* ----- 4) Components ---------------------------------------------------- */
.eyebrow{ font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); }
.h-large{ font-size:clamp(28px,7vw,34px); font-weight:760; letter-spacing:-0.03em; line-height:1.08; }
.h-title{ font-size:23px; font-weight:720; letter-spacing:-0.02em; }
.h-sec{ font-size:13px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; color:var(--text-3); margin:6px 2px 12px; }
.muted{ color:var(--text-2); }
.tiny{ font-size:12.5px; color:var(--text-3); }
.center{ text-align:center; }

.card{
  background:var(--card); border:1px solid var(--card-border);
  border-radius:var(--r-lg); padding:var(--pad);
  box-shadow:var(--shadow-1);
  backdrop-filter:saturate(160%) blur(14px); -webkit-backdrop-filter:saturate(160%) blur(14px);
  transition:transform var(--t) var(--ease), box-shadow var(--t) var(--ease), border-color var(--t);
}
.card + .card{ margin-top:var(--gap); }
.tap{ cursor:pointer; }
.tap:hover{ transform:translateY(-2px); box-shadow:var(--shadow-2); }
.tap:active{ transform:translateY(0) scale(.992); }

.row{ display:flex; align-items:center; gap:14px; }
.col{ display:flex; flex-direction:column; }
.between{ justify-content:space-between; }
.wrap{ flex-wrap:wrap; }
.grow{ flex:1; }
.stack > * + *{ margin-top:var(--gap); }

/* buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  height:52px; padding:0 22px; border-radius:var(--r-md);
  font-size:17px; font-weight:600; letter-spacing:-0.01em;
  background:var(--fill); color:var(--text);
  transition:transform var(--t-fast) var(--ease), background var(--t-fast), box-shadow var(--t-fast), opacity var(--t-fast);
  width:100%;
}
.btn:hover{ background:var(--fill-2); }
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--accent); color:var(--on-accent); box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 34%, transparent); }
.btn-primary:hover{ background:color-mix(in srgb,var(--accent) 90%, #000); }
.btn-graphite{ background:var(--graphite); color:var(--on-graphite); }
.btn-amber{ background:var(--amber); color:#3a2600; box-shadow:0 6px 18px color-mix(in srgb,var(--amber) 36%, transparent); }
.btn-ghost{ background:transparent; border:1.5px solid var(--card-border); }
.btn-sm{ height:42px; font-size:15px; padding:0 16px; width:auto; }
.btn-row{ display:flex; gap:10px; }
.btn[disabled]{ opacity:.45; pointer-events:none; }

/* pills / badges */
.pill{ display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 12px;
  border-radius:var(--r-pill); background:var(--fill); font-size:12.5px; font-weight:600; color:var(--text-2); }
.badge{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:var(--r-pill);
  font-size:11px; font-weight:700; letter-spacing:.02em; }
.badge-amber{ background:var(--amber-soft); color:#b06d00; }
.badge-green{ background:var(--green-soft); color:#1c7a36; }
.badge-accent{ background:color-mix(in srgb,var(--accent) 15%, transparent); color:var(--accent); }
.badge-ng{ background:color-mix(in srgb,var(--green) 16%, transparent); color:#1c7a36; }
[data-theme="dark"] .badge-amber,[data-theme="dark"] .badge-green,[data-theme="dark"] .badge-ng{ color:var(--text); }
@media (prefers-color-scheme:dark){ :root:not([data-theme="light"]) .badge-amber,
  :root:not([data-theme="light"]) .badge-green,:root:not([data-theme="light"]) .badge-ng{ color:var(--text);} }

/* journey/mission icon chip */
.chip{ width:46px; height:46px; min-width:46px; border-radius:14px; display:grid; place-items:center;
  background:var(--fill); color:var(--text); }
.chip svg{ width:24px; height:24px; }
.chip.accent{ background:color-mix(in srgb,var(--accent) 16%, transparent); color:var(--accent); }
.chip.amber{ background:var(--amber-soft); color:var(--amber); }
.chip.green{ background:var(--green-soft); color:var(--green); }
.chip.locked{ opacity:.5; }

/* progress ring */
.ring{ --p:0; width:120px; height:120px; position:relative; display:grid; place-items:center; }
.ring svg{ transform:rotate(-90deg); width:100%; height:100%; }
.ring .track{ fill:none; stroke:var(--fill-2); stroke-width:10; }
.ring .bar{ fill:none; stroke:url(#ringgrad); stroke-width:10; stroke-linecap:round;
  stroke-dasharray:var(--circ); stroke-dashoffset:var(--circ);
  transition:stroke-dashoffset 1s var(--ease); }
.ring .label{ position:absolute; text-align:center; }
.ring .label .pct{ font-size:30px; font-weight:760; letter-spacing:-0.03em; }
.ring .label .cap{ font-size:11px; color:var(--text-3); font-weight:600; }

/* thin progress bar */
.bar-track{ height:8px; border-radius:var(--r-pill); background:var(--fill-2); overflow:hidden; }
.bar-fill{ height:100%; border-radius:var(--r-pill);
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  width:0; transition:width .8s var(--ease); }
.bar-fill.amber{ background:linear-gradient(90deg,var(--amber),#ffd60a); }
.bar-fill.green{ background:linear-gradient(90deg,var(--green),#a0f0b0); }

/* stat tiles */
.stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.stat{ background:var(--card); border:1px solid var(--card-border); border-radius:var(--r-md);
  padding:14px; box-shadow:var(--shadow-1); }
.stat .n{ font-size:26px; font-weight:760; letter-spacing:-0.03em; }
.stat .l{ font-size:11.5px; color:var(--text-3); font-weight:600; margin-top:2px; }

/* readiness grid */
.ready-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.ready{ background:var(--card); border:1px solid var(--card-border); border-radius:var(--r-md); padding:14px; box-shadow:var(--shadow-1); }
.ready .rt{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.ready .rt .name{ font-size:13.5px; font-weight:700; }
.ready .rt .v{ font-size:13px; font-weight:700; color:var(--text-2); }

/* checklist */
.check{ display:flex; align-items:flex-start; gap:12px; padding:13px 4px; cursor:pointer;
  border-bottom:1px solid var(--hairline); transition:opacity var(--t-fast); }
.check:last-child{ border-bottom:none; }
.check input{ position:absolute; opacity:0; width:0; height:0; }
.box{ width:25px; height:25px; min-width:25px; border-radius:50%; border:2px solid var(--text-3);
  display:grid; place-items:center; transition:all var(--t-fast) var(--ease); margin-top:1px; }
.box svg{ width:14px; height:14px; stroke:#fff; opacity:0; transform:scale(.4); transition:all var(--t-fast) var(--ease); }
.check input:checked + .box{ background:var(--green); border-color:var(--green); }
.check input:checked + .box svg{ opacity:1; transform:scale(1); }
.check .ctext{ font-size:15.5px; line-height:1.35; padding-top:2px; }
.check input:checked ~ .ctext{ color:var(--text-3); text-decoration:line-through; text-decoration-color:var(--text-3); }

/* numbered today list */
.steps{ counter-reset:s; list-style:none; padding:0; margin:0; }
.steps li{ counter-increment:s; position:relative; padding:11px 0 11px 40px; font-size:15.5px; line-height:1.4;
  border-bottom:1px solid var(--hairline); }
.steps li:last-child{ border-bottom:none; }
.steps li::before{ content:counter(s); position:absolute; left:0; top:9px;
  width:26px; height:26px; border-radius:50%; background:var(--fill-2); color:var(--text-2);
  font-size:13px; font-weight:700; display:grid; place-items:center; }

/* forms */
.field{ margin-bottom:14px; }
.field label{ display:block; font-size:13px; font-weight:700; color:var(--text-2); margin:0 2px 6px; }
.input, .textarea, select.input{
  width:100%; padding:13px 14px; border-radius:var(--r-sm);
  background:var(--surface); border:1.5px solid var(--card-border); color:var(--text);
  transition:border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast); resize:vertical;
}
.input:focus, .textarea:focus{ outline:none; border-color:var(--accent);
  box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 16%, transparent); }
.textarea{ min-height:96px; line-height:1.5; }
.hint{ font-size:12px; color:var(--text-3); margin:5px 2px 0; }

/* segmented control */
.seg{ display:inline-flex; background:var(--fill); border-radius:var(--r-sm); padding:3px; gap:2px; width:100%; }
.seg button{ flex:1; padding:9px 10px; border-radius:10px; font-size:14px; font-weight:600; color:var(--text-2);
  transition:all var(--t-fast) var(--ease); }
.seg button.on{ background:var(--card-solid); color:var(--text); box-shadow:var(--shadow-1); }

/* list rows */
.list-card{ background:var(--card); border:1px solid var(--card-border); border-radius:var(--r-lg);
  box-shadow:var(--shadow-1); overflow:hidden; }
.lrow{ display:flex; align-items:center; gap:14px; padding:15px 16px; border-bottom:1px solid var(--hairline);
  transition:background var(--t-fast); }
.lrow:last-child{ border-bottom:none; }
.lrow.tap:hover{ background:var(--fill); transform:none; box-shadow:none; }
.lrow .lt{ flex:1; min-width:0; }
.lrow .lt .t1{ font-size:16px; font-weight:650; }
.lrow .lt .t2{ font-size:13px; color:var(--text-3); margin-top:1px; }
.lrow .chev{ color:var(--text-3); }
.lrow .chev svg{ width:18px; height:18px; }

/* resource item */
.res-item{ display:flex; gap:12px; align-items:flex-start; padding:14px 16px; border-bottom:1px solid var(--hairline); }
.res-item:last-child{ border-bottom:none; }
.res-item .ri-t{ font-size:15.5px; font-weight:650; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.res-item .ri-d{ font-size:13px; color:var(--text-2); margin-top:2px; }
.res-item .ri-open{ color:var(--accent); margin-top:1px; }
.res-item .ri-open svg{ width:18px; height:18px; }

/* hero / welcome */
.hero{ min-height:calc(100vh - 40px); display:flex; flex-direction:column; justify-content:center; gap:24px; padding:30px 4px; }
.logo-mark{ width:74px; height:74px; border-radius:20px; display:grid; place-items:center;
  background:linear-gradient(150deg,var(--graphite),#3a3a3c); color:var(--on-graphite);
  box-shadow:var(--shadow-pop); }
[data-theme="dark"] .logo-mark{ background:linear-gradient(150deg,#2c2c2e,#48484a); }
.logo-mark svg{ width:40px; height:40px; }

/* empty state */
.empty{ text-align:center; padding:48px 20px; color:var(--text-3); }
.empty .chip{ margin:0 auto 14px; width:56px; height:56px; }

/* toast */
#toast{ position:fixed; left:50%; bottom:calc(var(--tabbar-h) + 26px); transform:translate(-50%,20px);
  z-index:90; background:var(--graphite); color:var(--on-graphite);
  padding:12px 18px; border-radius:var(--r-pill); font-size:14px; font-weight:600;
  box-shadow:var(--shadow-pop); opacity:0; pointer-events:none; transition:all var(--t) var(--ease);
  display:flex; align-items:center; gap:8px; max-width:90vw; }
#toast.show{ opacity:1; transform:translate(-50%,0); }
#toast svg{ width:16px; height:16px; color:var(--green); }

/* celebrate overlay */
#celebrate{ position:fixed; inset:0; z-index:80; display:none; place-items:center; pointer-events:none; }
#celebrate.show{ display:grid; }
.celebrate-mark{ width:108px; height:108px; border-radius:50%; background:var(--green);
  display:grid; place-items:center; box-shadow:0 18px 50px color-mix(in srgb,var(--green) 50%, transparent);
  animation:pop .5s var(--ease); }
.celebrate-mark svg{ width:54px; height:54px; stroke:#fff; }
.confetti{ position:absolute; width:9px; height:14px; border-radius:2px; opacity:0; }

/* divider */
.hr{ height:1px; background:var(--hairline); margin:18px 0; border:none; }

/* notice */
.notice{ background:var(--amber-soft); border:1px solid color-mix(in srgb,var(--amber) 30%, transparent);
  border-radius:var(--r-md); padding:13px 15px; font-size:14px; }
.notice.accent{ background:color-mix(in srgb,var(--accent) 10%, transparent);
  border-color:color-mix(in srgb,var(--accent) 28%, transparent); }

/* lock */
.lockmsg{ display:flex; align-items:center; gap:8px; color:var(--text-3); font-size:13.5px; }
.lockmsg svg{ width:15px; height:15px; }

/* ----- 6) Animations ---------------------------------------------------- */
@keyframes viewIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0);} }
.view.active.enter{ animation:viewIn var(--t) var(--ease); }
.stagger > *{ opacity:0; animation:viewIn var(--t) var(--ease) forwards; }
.stagger > *:nth-child(1){ animation-delay:.02s; }
.stagger > *:nth-child(2){ animation-delay:.07s; }
.stagger > *:nth-child(3){ animation-delay:.12s; }
.stagger > *:nth-child(4){ animation-delay:.17s; }
.stagger > *:nth-child(5){ animation-delay:.22s; }
.stagger > *:nth-child(6){ animation-delay:.27s; }
.stagger > *:nth-child(7){ animation-delay:.32s; }
.stagger > *:nth-child(8){ animation-delay:.37s; }
.stagger > *:nth-child(n+9){ animation-delay:.4s; }
@keyframes pop{ 0%{ transform:scale(0); opacity:0;} 60%{ transform:scale(1.12);} 100%{ transform:scale(1); opacity:1;} }
@keyframes fall{ 0%{ opacity:1; transform:translateY(-10px) rotate(0);} 100%{ opacity:0; transform:translateY(70vh) rotate(540deg);} }

/* ----- 7) Responsive ---------------------------------------------------- */
@media (min-width:680px){
  .ready-grid{ grid-template-columns:repeat(4,1fr); }
  .tab{ flex-direction:row; gap:7px; font-size:13px; padding:9px 18px; }
  .tab svg{ width:19px; height:19px; }
}
@media (min-width:780px){
  .view{ padding-top:26px; }
}

/* ----- 8) Reduced motion ----------------------------------------------- */
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important;
     transition-duration:.001ms !important; scroll-behavior:auto !important; }
  .tap:hover{ transform:none; }
}

/* ---------- State ------------------------------------------------------- */
const STORAGE_KEY = 'engineeros.v1';
function defaultState(){
  return {
    version:1, onboarded:false,
    user:{ name:'' },
    theme:'system',             // system | light | dark
    freeNav:false,              // unlock everything
    completed:{},               // missionId -> true
    missionData:{},             // missionId -> { checks:{i:true}, reflection, notes }
    streak:{ count:0, best:0, last:'' },
    builders:{ portfolio:{}, resume:{}, linkedin:{} },
    reviews:[]                  // [{date, done, learned, confused, built, next}]
  };
}
let state = loadState();
function loadState(){
  try{ const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ const p = JSON.parse(raw); return deepDefaults(p); } }catch(e){}
  return defaultState();
}
function deepDefaults(p){
  const d = defaultState();
  const s = Object.assign(d, p);
  s.user = Object.assign(d.user, p.user||{});
  s.streak = Object.assign(d.streak, p.streak||{});
  s.builders = Object.assign(d.builders, p.builders||{});
  s.completed = p.completed||{};
  s.missionData = p.missionData||{};
  s.reviews = p.reviews||[];
  return s;
}
let saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>{ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }, 120); }
function saveNow(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }

const $ = (s,r=document)=>r.querySelector(s);
const esc = (s='')=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const todayStr = ()=> new Date().toISOString().slice(0,10);
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function firstName(){ return (state.user.name||'there').trim().split(/\s+/)[0] || 'there'; }
function flat(){ const out=[]; JOURNEYS.forEach((j,ji)=>j.missions.forEach((m,mi)=>out.push({j,ji,m,mi}))); return out; }
function totalMissions(){ return flat().length; }
function completedCount(){ return Object.keys(state.completed).filter(k=>state.completed[k]).length; }
function md(id){ return state.missionData[id] || (state.missionData[id]={checks:{},reflection:'',notes:''}); }

/* ---------- Unlock logic (progressive disclosure) ---------------------- */
function journeyComplete(ji){ const j=JOURNEYS[ji]; return j && j.missions.every(m=>state.completed[m.id]); }
function isJourneyUnlocked(ji){ return state.freeNav || ji===0 || journeyComplete(ji-1); }
function isMissionUnlocked(ji,mi){
  if(state.freeNav) return true;
  if(!isJourneyUnlocked(ji)) return false;
  if(mi===0) return true;
  return !!state.completed[JOURNEYS[ji].missions[mi-1].id];
}
/* The single "today" mission: first unlocked + uncompleted */
function todaysMission(){
  for(const {j,ji,m,mi} of flat()){
    if(isMissionUnlocked(ji,mi) && !state.completed[m.id]) return {j,ji,m,mi};
  }
  return null;
}
function findMission(id){ return flat().find(x=>x.m.id===id) || null; }

/* ---------- Streak ------------------------------------------------------ */
function liveStreak(){
  const t=todayStr(), y=yesterdayStr();
  if(state.streak.last===t||state.streak.last===y) return state.streak.count;
  return 0; /* broken streak shows 0 until next win */
}
function touchStreak(){
  const t=todayStr();
  if(state.streak.last===t) return;
  if(state.streak.last===yesterdayStr()) state.streak.count+=1;
  else state.streak.count=1;
  state.streak.last=t;
  if(state.streak.count>state.streak.best) state.streak.best=state.streak.count;
}

/* ---------- Readiness --------------------------------------------------- */
function pctFilled(obj, keys){
  if(!obj) return 0;
  let n=0; keys.forEach(k=>{ if(obj[k] && String(obj[k]).trim().length>2) n++; });
  return Math.round(n/keys.length*100);
}
const RESUME_KEYS=['name','email','phone','location','summary','education','skills','projects','experience','certifications'];
const LI_KEYS=['headline','about','education','skills','featured','post'];
const PF_KEYS=['about','education','project','skills','tools','projects','certs','contact'];
const GH_MILESTONES=['j1m5','j6m6','j6m7','j6m8'];
function resumeReady(){ return pctFilled(state.builders.resume, RESUME_KEYS); }
function linkedinReady(){ return pctFilled(state.builders.linkedin, LI_KEYS); }
function portfolioReady(){ return pctFilled(state.builders.portfolio, PF_KEYS); }
function githubReady(){ let n=GH_MILESTONES.filter(id=>state.completed[id]).length; return Math.round(n/GH_MILESTONES.length*100); }
function overallPct(){ const t=totalMissions(); return t? Math.round(completedCount()/t*100):0; }

/* ---------- Router ------------------------------------------------------ */
let currentView='welcome';
let viewParam=null;
const NAV_VIEWS={ home:1, journeys:1, build:1, review:1, resources:1 };
const RENDER={};   /* viewName -> render fn (assigned later) */
function go(view, param=null, dir='f'){
  viewParam=param;
  if(RENDER[view]) RENDER[view](param);
  const el=$('#view-'+view);
  document.querySelectorAll('.view').forEach(v=>{ v.classList.remove('active','enter'); });
  el.classList.add('active');
  void el.offsetWidth;            /* reflow to restart animation */
  el.classList.add('enter');
  currentView=view;
  window.scrollTo({top:0,behavior:'instant'in window?'instant':'auto'});
  $('#topbar').classList.remove('scrolled');
  updateChrome();
}
/* Which views show a back button, and where back goes */
const BACK_TO={ journey:'journeys', mission:()=>backFromMission(), progress:'home',
  portfolio:'build', resume:'build', linkedin:'build', settings:'home' };
let missionFrom='journey';
function backFromMission(){ return missionFrom==='home'?'home':'journey'; }
function updateChrome(){
  const onboarding = currentView==='welcome'||currentView==='setup';
  $('#app').classList.toggle('onboarding', onboarding);
  const back=$('#backBtn');
  back.style.display = BACK_TO[currentView] ? 'grid':'none';
  /* tab highlight */
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.value===currentView);
  });
}
function handleBack(){
  let to=BACK_TO[currentView];
  if(typeof to==='function') to=to();
  if(currentView==='journey') return go('journeys');
  if(currentView==='mission') return go(missionFrom==='home'?'home':'journey', missionFrom==='home'?null:currentJourneyIndex);
  go(to||'home');
}

/* ---------- Theme ------------------------------------------------------- */
function applyTheme(){
  const t=state.theme;
  const root=document.documentElement;
  if(t==='system') root.removeAttribute('data-theme');
  else root.setAttribute('data-theme', t);
  /* update quick toggle icon: show what you'll get next */
  const dark = t==='dark' || (t==='system' && matchMedia('(prefers-color-scheme:dark)').matches);
  $('#themeIcon').outerHTML = dark
    ? '<svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a6.6 6.6 0 0 0 9.8 9.8Z"/></svg>'
    : '<svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.8 4.8l1.7 1.7M17.5 17.5l1.7 1.7M19.2 4.8l-1.7 1.7M6.5 17.5l-1.7 1.7"/></svg>';
}
function cycleTheme(){
  state.theme = state.theme==='light' ? 'dark' : state.theme==='dark' ? 'system' : 'light';
  applyTheme(); save();
  toast(`Theme: ${state.theme}`);
}
matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>{ if(state.theme==='system') applyTheme(); });

/* ---------- Toast & celebrate ------------------------------------------ */
let toastTimer=null;
function toast(msg, withCheck=true){
  const el=$('#toast');
  el.innerHTML=(withCheck?I.check:'')+'<span>'+esc(msg)+'</span>';
  el.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
function celebrate(){
  const el=$('#celebrate');
  el.innerHTML='<div class="celebrate-mark">'+I.check+'</div>';
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(!reduce){
    const colors=['#0a84ff','#34c759','#ff9f0a','#00b4d8','#ff453a'];
    for(let i=0;i<26;i++){
      const c=document.createElement('span'); c.className='confetti';
      c.style.background=colors[i%colors.length];
      c.style.left=(50+(Math.random()*60-30))+'%';
      c.style.top='40%';
      c.style.animation=`fall ${0.9+Math.random()*0.8}s var(--ease) ${Math.random()*0.2}s forwards`;
      el.appendChild(c);
    }
  }
  el.classList.add('show');
  setTimeout(()=>{ el.classList.remove('show'); el.innerHTML=''; }, 1300);
}

/* ---------- Download / copy -------------------------------------------- */
function download(filename, text, type='text/markdown;charset=utf-8'){
  const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function copyText(text){
  try{ await navigator.clipboard.writeText(text); toast('Copied to clipboard'); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('Copied to clipboard'); }catch(_){ toast('Copy failed',false); }
    ta.remove();
  }
}

/* ----- Generic builder form factory ------------------------------------ */
function builderView(rootId, store, title, eyebrow, fields, exportName, exportFn, intro){
  const b=state.builders[store];
  const html=fields.map(f=>{
    const val=esc(b[f.k]||'');
    if(f.type==='area') return `<div class="field"><label>${f.l}</label>
      <textarea class="textarea" data-builder="${store}:${f.k}" placeholder="${esc(f.p||'')}" ${f.rows?`style="min-height:${f.rows*24}px"`:''}>${val}</textarea>
      ${f.h?`<div class="hint">${f.h}</div>`:''}</div>`;
    return `<div class="field"><label>${f.l}</label>
      <input class="input" data-builder="${store}:${f.k}" placeholder="${esc(f.p||'')}" value="${val}" ${f.type==='email'?'type="email"':f.type==='tel'?'type="tel"':''} />
      ${f.h?`<div class="hint">${f.h}</div>`:''}</div>`;
  }).join('');
  $('#'+rootId).innerHTML=`
    <div class="stagger">
      <div style="margin:2px 2px 14px"><div class="eyebrow">${eyebrow}</div>
        <h1 class="h-large" style="margin-top:6px; font-size:30px">${title}</h1></div>
      ${intro?`<div class="notice accent" style="margin-bottom:16px">${intro}</div>`:''}
      <div class="card">${html}</div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn btn-primary" data-action="${exportName}">${I.download} Export Markdown</button>
        <button class="btn btn-ghost btn-sm" data-action="${exportName}-copy" style="width:auto">${I.copy} Copy</button>
      </div>
      <p class="tiny center" style="margin-top:10px">Saved automatically on this device as you type.</p>
    </div>`;
}

/* =======================================================================
   ACTIONS
   ======================================================================= */
function completeMission(id){
  if(!state.completed[id]){
    state.completed[id]=true;
    touchStreak();
    saveNow();
    celebrate();
    toast("Today's win saved");
  }
  const found=findMission(id);
  /* find next mission to suggest */
  setTimeout(()=>{
    const tm=todaysMission();
    if(tm){
      // if next mission is in same journey, drop user back to journey list; else home
      go(missionFrom==='home'?'home': (tm.ji===found.ji?'journey':'journeys'), tm.ji===found.ji?found.ji:null);
    } else {
      go('home');
    }
  }, 950);
}
function reopenMission(id){ delete state.completed[id]; saveNow(); RENDER.mission(id); toast('Reopened',false); }

function buildExport(store){
  const b=state.builders[store]||{};
  const L=[]; const name=b.name||state.user.name||'';
  if(store==='resume'){
    L.push(`# ${b.name||'Your Name'}`);
    const contact=[b.email,b.phone,b.location].filter(Boolean).join(' · ');
    if(contact) L.push(contact);
    sec(L,'Summary',b.summary); sec(L,'Education',b.education); sec(L,'Skills',b.skills);
    sec(L,'Projects',b.projects); sec(L,'Experience',b.experience); sec(L,'Certifications',b.certifications);
  } else if(store==='portfolio'){
    L.push(`# Portfolio — ${name||'Your Name'}`);
    sec(L,'About',b.about); sec(L,'Education',b.education); sec(L,'Final-Year Project',b.project);
    sec(L,'Skills',b.skills); sec(L,'Tools & Software',b.tools); sec(L,'Projects',b.projects);
    sec(L,'Certifications',b.certs); sec(L,'Contact',b.contact);
  } else {
    L.push(`# LinkedIn — ${name||'Your Name'}`);
    sec(L,'Headline',b.headline); sec(L,'About',b.about); sec(L,'Education',b.education);
    sec(L,'Skills',b.skills); sec(L,'Featured Projects',b.featured); sec(L,'First Post Draft',b.post);
  }
  return L.join('\n\n')+'\n';
}
function sec(L,title,val){ if(val && String(val).trim()){ L.push(`## ${title}\n\n${String(val).trim()}`); } }

function exportBuilder(store, copy){
  const text=buildExport(store);
  if(copy){ copyText(text); }
  else { download(`${store}-${(state.user.name||'engineeros').toLowerCase().replace(/\s+/g,'-')}.md`, text); toast('Markdown downloaded'); }
}

function saveReview(){
  const r={ date:new Date().toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}),
    done:$('#rv-done').value.trim(), learned:$('#rv-learned').value.trim(),
    confused:$('#rv-confused').value.trim(), built:$('#rv-built').value.trim(), next:$('#rv-next').value.trim() };
  if(!r.done&&!r.learned&&!r.confused&&!r.built&&!r.next){ toast('Write at least one line first',false); return; }
  state.reviews.push(r); touchStreak(); saveNow(); celebrate(); RENDER.review();
  $('#view-review').classList.add('enter');
}

function exportJSON(){ download('engineeros-progress.json', JSON.stringify(state,null,2),'application/json'); toast('Backup downloaded'); }
function importJSON(){ $('#importFile').click(); }
$('#importFile').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const p=JSON.parse(r.result); state=deepDefaults(p); saveNow(); applyTheme(); go('home'); toast('Progress imported'); }
    catch(err){ toast('Could not read that file',false); } };
  r.readAsText(f); e.target.value='';
});
function resetAll(){
  if(confirm('Reset everything? This clears all progress, reflections and builders on this device. Export a backup first if unsure.')){
    const theme=state.theme; state=defaultState(); state.theme=theme; saveNow(); applyTheme();
    go('welcome'); toast('Fresh start',false);
  }
}
function setTheme(t){ state.theme=t; applyTheme(); save();
  document.querySelectorAll('[data-theme-set]').forEach(b=>b.classList.toggle('on', b.dataset.themeSet===t)); }

/* =======================================================================
   EVENT WIRING
   ======================================================================= */
document.addEventListener('click', e=>{
  const themeBtn=e.target.closest('[data-theme-set]');
  if(themeBtn){ setTheme(themeBtn.dataset.themeSet); return; }
  const t=e.target.closest('[data-action]'); if(!t) return;
  const a=t.dataset.action, v=t.dataset.value;
  switch(a){
    case 'to-setup': go('setup'); break;
    case 'finish-setup': {
      const n=$('#nameInput'); state.user.name=(n&&n.value.trim())||'';
      state.onboarded=true; touchStreak(); saveNow(); go('home');
      toast('Welcome aboard, '+firstName()); break; }
    case 'nav': go(v); break;
    case 'open-journey': go('journey', parseInt(v,10)); break;
    case 'open-mission': missionFrom=t.dataset.from||'journey'; go('mission', v); break;
    case 'open-progress': go('progress'); break;
    case 'open-settings': go('settings'); break;
    case 'back': handleBack(); break;
    case 'toggle-theme': cycleTheme(); break;
    case 'complete-mission': completeMission(v); break;
    case 'reopen-mission': reopenMission(v); break;
    case 'export-resume': exportBuilder('resume',false); break;
    case 'export-resume-copy': exportBuilder('resume',true); break;
    case 'export-portfolio': exportBuilder('portfolio',false); break;
    case 'export-portfolio-copy': exportBuilder('portfolio',true); break;
    case 'export-linkedin': exportBuilder('linkedin',false); break;
    case 'export-linkedin-copy': exportBuilder('linkedin',true); break;
    case 'save-review': saveReview(); break;
    case 'export-json': exportJSON(); break;
    case 'import-json': importJSON(); break;
    case 'reset': resetAll(); break;
    case 'toggle-freenav': state.freeNav=!state.freeNav; save(); RENDER.settings(); toast(state.freeNav?'All unlocked':'Guided mode',false); break;
  }
});

/* checkbox + textarea (delegated) */
document.addEventListener('change', e=>{
  const c=e.target.closest('[data-check]');
  if(c){ const [id,i]=c.dataset.check.split(':'); const d=md(id); d.checks[i]=c.checked; save();
    const m=findMission(id).m; const bar=$('#checkbar'); if(bar) bar.style.width=checkPct(m,d)+'%'; }
});
document.addEventListener('input', e=>{
  const r=e.target.closest('[data-reflect]'); if(r){ md(r.dataset.reflect).reflection=r.value; save(); return; }
  const n=e.target.closest('[data-notes]'); if(n){ md(n.dataset.notes).notes=r?r.value:n.value; save(); return; }
  const b=e.target.closest('[data-builder]'); if(b){ const [store,key]=b.dataset.builder.split(':');
    state.builders[store]=state.builders[store]||{}; state.builders[store][key]=b.value; save(); return; }
  const sn=e.target.closest('#set-name'); if(sn){ state.user.name=sn.value; save(); }
});

/* topbar shadow on scroll */
window.addEventListener('scroll',()=>{ $('#topbar').classList.toggle('scrolled', window.scrollY>6); }, {passive:true});

/* =======================================================================
   INIT
   ======================================================================= */
function init(){
  applyTheme();
  if(state.onboarded){ go('home'); }
  else { go('welcome'); }
}
init();
</script>
