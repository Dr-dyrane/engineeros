<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="theme-color" content="#eef0f4" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="description" content="EngineerOS by Dyrane Academy — a calm, self-guided career accelerator. One mission at a time." />
<title>EngineerOS · Dyrane Academy</title>

<!-- No-flash theme bootstrap: apply saved manual theme before first paint. -->
<script>
  try { var s = JSON.parse(localStorage.getItem('engineeros.v1') || '{}');
    if (s.theme === 'dark' || s.theme === 'light') document.documentElement.setAttribute('data-theme', s.theme);
  } catch (e) {}
</script>

<!-- Fonts (Inter as cross-platform fallback; real SF is used on Apple devices) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<!-- Tailwind (CDN) — preflight OFF so it never reintroduces borders/resets over our system -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    corePlugins: { preflight: false },
    theme: {
      extend: {
        colors: {
          accent: 'var(--accent)', amber: 'var(--amber)', green: 'var(--green)', danger: 'var(--red)',
          surface: 'var(--surface-1)', sunken: 'var(--surface-sunken)',
          ink: 'var(--text)', ink2: 'var(--text-2)', ink3: 'var(--text-3)'
        },
        fontFamily: { sans: ['var(--font-sans)'], mono: ['var(--font-mono)'] },
        borderRadius: { xs:'var(--r-xs)', sm:'var(--r-sm)', md:'var(--r-md)', lg:'var(--r-lg)',
                        xl:'var(--r-xl)', card:'var(--r-card)', sheet:'var(--r-sheet)' },
        boxShadow: { e1:'var(--shadow-1)', e2:'var(--shadow-2)', e3:'var(--shadow-3)' },
        backdropBlur: { glass: '22px' }
      }
    }
  };
</script>

<!-- Design system (order matters: tokens → base → components → motion) -->
<link rel="stylesheet" href="./styles/tokens.css" />
<link rel="stylesheet" href="./styles/base.css" />
<link rel="stylesheet" href="./styles/components.css" />
<link rel="stylesheet" href="./styles/animations.css" />

<!-- Lucide icons (CDN) -->
<script src="https://unpkg.com/lucide@latest" defer></script>
</head>

<body>
<div id="app" class="is-onboarding">

  <!-- Top bar (functional glass layer) -->
  <header id="topbar">
    <button id="backBtn" class="iconbtn is-quiet" data-action="back" aria-label="Go back" style="display:none">
      <i data-lucide="chevron-left"></i>
    </button>
    <div class="col" style="line-height:1">
      <span class="fw-bold" style="font-size:15px; letter-spacing:-0.02em">EngineerOS</span>
      <span class="t-caption text-3 fw-semibold" style="text-transform:uppercase; letter-spacing:0.05em; margin-top:2px">Dyrane Academy</span>
    </div>
    <span class="grow"></span>
    <button class="iconbtn" data-action="toggle-theme" aria-label="Toggle theme"><i data-lucide="sun" id="themeIcon"></i></button>
    <button class="iconbtn" data-action="open-settings" aria-label="Settings"><i data-lucide="settings-2"></i></button>
  </header>

  <!-- Focused views (one visible at a time; rendered by JS) -->
  <main id="views">
    <section class="view" id="view-welcome"></section>
    <section class="view" id="view-setup"></section>
    <section class="view" id="view-home"></section>
    <section class="view" id="view-journeys"></section>
    <section class="view" id="view-journey"></section>
    <section class="view" id="view-mission"></section>
    <section class="view" id="view-progress"></section>
    <section class="view" id="view-build"></section>
    <section class="view" id="view-portfolio"></section>
    <section class="view" id="view-resume"></section>
    <section class="view" id="view-linkedin"></section>
    <section class="view" id="view-review"></section>
    <section class="view" id="view-resources"></section>
    <section class="view" id="view-settings"></section>
  </main>

  <!-- Tab bar -->
  <nav id="tabbar" aria-label="Primary">
    <div class="tabbar-pill material">
      <button class="tab" data-action="nav" data-value="home" aria-label="Today"><i data-lucide="house"></i><span>Today</span></button>
      <button class="tab" data-action="nav" data-value="journeys" aria-label="Journeys"><i data-lucide="route"></i><span>Journeys</span></button>
      <button class="tab" data-action="nav" data-value="build" aria-label="Build"><i data-lucide="hammer"></i><span>Build</span></button>
      <button class="tab" data-action="nav" data-value="review" aria-label="Review"><i data-lucide="calendar-check"></i><span>Review</span></button>
      <button class="tab" data-action="nav" data-value="resources" aria-label="Resources"><i data-lucide="library"></i><span>Resources</span></button>
    </div>
  </nav>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<div id="celebrate" aria-hidden="true"></div>
<input type="file" id="importFile" accept="application/json" hidden />

<script type="module" src="./src/main.js"></script>
</body>
</html>
