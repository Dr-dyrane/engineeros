<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="theme-color" content="#eef0f4" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
<meta name="description" content="EngineerOS by Dyrane Academy, a calm, self-guided career accelerator. One mission at a time." />
<title>EngineerOS · Dyrane Academy</title>

<!-- App identity: favicon, app icons, PWA manifest -->
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="EngineerOS" />

<!-- Social share (Open Graph + Twitter) -->
<meta property="og:type" content="website" />
<meta property="og:title" content="EngineerOS · Dyrane Academy" />
<meta property="og:description" content="A calm, self-guided career accelerator. One mission at a time." />
<meta property="og:url" content="https://launch.dyrane.tech/" />
<meta property="og:image" content="https://launch.dyrane.tech/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="EngineerOS · Dyrane Academy" />
<meta name="twitter:description" content="A calm, self-guided career accelerator. One mission at a time." />
<meta name="twitter:image" content="https://launch.dyrane.tech/og.png" />

<!-- No-flash theme bootstrap: apply saved manual theme before first paint. -->
<script>
  try { var s = JSON.parse(localStorage.getItem('engineeros.v1') || '{}');
    if (s.theme === 'dark' || s.theme === 'light') document.documentElement.setAttribute('data-theme', s.theme);
  } catch (e) {}
</script>

<!-- No webfont: text uses each platform native UI font (SF, Roboto, Segoe UI) for crisp, instant rendering on any screen and connection. -->

<!-- Design system (order matters: tokens, base, components, motion) -->
<link rel="stylesheet" href="./styles/tokens.css" />
<link rel="stylesheet" href="./styles/base.css" />
<link rel="stylesheet" href="./styles/components.css" />
<link rel="stylesheet" href="./styles/studio.css" />
<link rel="stylesheet" href="./styles/animations.css" />
<link rel="stylesheet" href="./styles/print.css" />

<!-- Lucide icons (CDN, pinned) -->
<script src="https://unpkg.com/lucide@1.22.0/dist/umd/lucide.min.js" defer></script>
</head>

<body>
<div id="app" class="is-onboarding">

  <!-- Top bar (functional glass layer) -->
  <header id="topbar">
    <button id="backBtn" class="iconbtn is-quiet" data-action="back" aria-label="Go back" style="display:none">
      <i data-lucide="chevron-left"></i>
    </button>
    <div class="col" style="line-height:1">
      <span class="fw-bold" style="font-size:15px; letter-spacing:-0.02em">EngineerOS</span>
      <span class="t-caption text-3 fw-semibold" style="text-transform:uppercase; letter-spacing:0.05em; margin-top:2px">Dyrane Academy</span>
    </div>
    <span class="grow"></span>
    <button class="iconbtn" data-action="toggle-theme" aria-label="Toggle theme"><i data-lucide="sun" id="themeIcon"></i></button>
    <button class="iconbtn" data-action="open-settings" aria-label="Settings"><i data-lucide="settings-2"></i></button>
  </header>

  <!-- Focused views (one visible at a time; rendered by JS) -->
  <main id="views">
    <section class="view" id="view-welcome"></section>
    <section class="view" id="view-setup"></section>
    <section class="view view-grid" id="view-home"></section>
    <section class="view view-grid" id="view-journeys"></section>
    <section class="view" id="view-journey"></section>
    <section class="view" id="view-mission"></section>
    <section class="view" id="view-progress"></section>
    <section class="view view-grid" id="view-build"></section>
    <section class="view view-wide" id="view-portfolio"></section>
    <section class="view view-wide" id="view-resume"></section>
    <section class="view view-wide" id="view-linkedin"></section>
    <section class="view" id="view-review"></section>
    <section class="view view-grid" id="view-resources"></section>
    <section class="view view-grid" id="view-earn"></section>
    <section class="view" id="view-launchpad"></section>
    <section class="view" id="view-settings"></section>
  </main>

  <!-- Tab bar -->
  <nav id="tabbar" aria-label="Primary">
    <div class="tabbar-pill material">
      <button class="tab" data-action="nav" data-value="home" aria-label="Today"><i data-lucide="house"></i><span>Today</span></button>
      <button class="tab" data-action="nav" data-value="journeys" aria-label="Journeys"><i data-lucide="route"></i><span>Journeys</span></button>
      <button class="tab" data-action="nav" data-value="build" aria-label="Build"><i data-lucide="hammer"></i><span>Build</span></button>
      <button class="tab" data-action="nav" data-value="review" aria-label="Review"><i data-lucide="calendar-check"></i><span>Review</span></button>
      <button class="tab" data-action="nav" data-value="resources" aria-label="Resources"><i data-lucide="library"></i><span>Resources</span></button>
    </div>
  </nav>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<div id="celebrate" aria-hidden="true"></div>
<input type="file" id="importFile" accept="application/json" hidden />

<script type="module" src="./src/main.js"></script>
<script>
  // Register the service worker (offline / installable). Safe no-op if unsupported.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () { navigator.serviceWorker.register('/sw.js').catch(function () {}); });
  }
</script>
</body>
</html>
